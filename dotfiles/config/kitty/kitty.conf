# Kanagawa Wave — Kitty Terminal Config

# ── Fontes ──────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

font_features JetBrainsMonoNF-Regular   +liga +calt
font_features JetBrainsMonoNF-Bold      +liga +calt
font_features JetBrainsMonoNF-Italic    +liga +calt

# ── Cores: Kanagawa Wave ────────────────────────────────────────────
foreground            #DCD7BA
background            #1F1F28
selection_foreground  #C8C093
selection_background  #2D4F67

cursor                #C8C093
cursor_text_color     #1F1F28
cursor_shape          block
cursor_blink_interval 0

url_color             #72A7BC
url_style             curly

# Black
color0   #16161D
color8   #727169
# Red
color1   #C34043
color9   #E46876
# Green
color2   #76946A
color10  #98BB6C
# Yellow
color3   #C0A36E
color11  #E6C384
# Blue
color4   #7E9CD8
color12  #7FB4CA
# Magenta
color5   #957FB8
color13  #938AA9
# Cyan
color6   #6A9589
color14  #7AA89F
# White
color7   #C8C093
color15  #DCD7BA

# ── Janela ──────────────────────────────────────────────────────────
window_padding_width    12
hide_window_decorations yes
background_opacity      0.93
dynamic_background_opacity yes

active_border_color   #7E9CD8
inactive_border_color #727169
inactive_text_alpha   0.7

# ── Tabs ─────────────────────────────────────────────────────────────
tab_bar_style         powerline
tab_powerline_style   round
tab_bar_min_tabs      2
tab_bar_margin_height 4 0

active_tab_foreground   #1F1F28
active_tab_background   #7E9CD8
active_tab_font_style   bold
inactive_tab_foreground #727169
inactive_tab_background #1F1F28

# ── Atalhos ──────────────────────────────────────────────────────────
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+enter new_window_with_cwd
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# ── Performance ──────────────────────────────────────────────────────
repaint_delay    10
input_delay       3
sync_to_monitor  yes

# ── Misc ─────────────────────────────────────────────────────────────
enable_audio_bell    no
scrollback_lines     10000
copy_on_select       yes
strip_trailing_spaces smart
confirm_os_window_close 0
